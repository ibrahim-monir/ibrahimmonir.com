name: Deploy Backend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script_stop: true
          script: |
            DOMAIN=~/domains/api.ibrahimmonir.com
            cd $DOMAIN
            rm -rf /tmp/deploy_temp
            git clone --depth=1 https://github.com/ibrahim-monir/ibrahimmonir.com.git /tmp/deploy_temp
            cp -r /tmp/deploy_temp/backend/. $DOMAIN/laravel/
            # Set up the public_html docroot (front controller + rewrite rules)
            mkdir -p $DOMAIN/public_html
            cp /tmp/deploy_temp/backend/public_html_index.php $DOMAIN/public_html/index.php
            cp /tmp/deploy_temp/backend/public_html.htaccess $DOMAIN/public_html/.htaccess
            ln -sfn $DOMAIN/laravel/storage/app/public $DOMAIN/public_html/storage
            rm -rf /tmp/deploy_temp
            cd $DOMAIN/laravel
            composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts --quiet
            /opt/alt/php84/usr/bin/php artisan package:discover --ansi
            /opt/alt/php84/usr/bin/php artisan filament:upgrade
            /opt/alt/php84/usr/bin/php artisan migrate --force
            /opt/alt/php84/usr/bin/php artisan storage:link --force
            /opt/alt/php84/usr/bin/php artisan db:seed --class=AdminUserSeeder --force
            /opt/alt/php84/usr/bin/php artisan config:cache
            /opt/alt/php84/usr/bin/php artisan route:cache
            /opt/alt/php84/usr/bin/php artisan view:cache