name: Deploy Backend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

      - name: Deploy via SSH
        run: |
          ssh -i ~/.ssh/deploy_key \
              -p ${{ secrets.SSH_PORT }} \
              -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o ConnectTimeout=30 \
              -o ServerAliveInterval=60 \
              -o ServerAliveCountMax=10 \
              ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} << 'ENDSSH'
            set -e
            DOMAIN=~/domains/api.ibrahimmonir.com
            curl -sL "https://github.com/ibrahim-monir/ibrahimmonir.com/archive/refs/heads/main.tar.gz" -o /tmp/repo.tar.gz
            mkdir -p /tmp/repo_extract
            tar -xzf /tmp/repo.tar.gz -C /tmp/repo_extract/
            cp -r /tmp/repo_extract/ibrahimmonir.com-main/backend/. $DOMAIN/laravel/
            rm -rf /tmp/repo_extract /tmp/repo.tar.gz
            mkdir -p $DOMAIN/public_html
            cp $DOMAIN/laravel/public_html_index.php $DOMAIN/public_html/index.php
            cp $DOMAIN/laravel/public_html.htaccess $DOMAIN/public_html/.htaccess
            ln -sfn $DOMAIN/laravel/storage/app/public $DOMAIN/public_html/storage
            cd $DOMAIN/laravel
            composer install --no-dev --optimize-autoloader --ignore-platform-reqs --no-scripts --quiet
            /opt/alt/php84/usr/bin/php artisan package:discover --ansi
            /opt/alt/php84/usr/bin/php artisan filament:upgrade
            /opt/alt/php84/usr/bin/php artisan migrate --force
            /opt/alt/php84/usr/bin/php artisan storage:link --force
            /opt/alt/php84/usr/bin/php artisan db:seed --class=AdminUserSeeder --force
            /opt/alt/php84/usr/bin/php artisan db:seed --class=WorkSeeder --force
            /opt/alt/php84/usr/bin/php artisan db:seed --class=ArnaFashionWorkSeeder --force
            /opt/alt/php84/usr/bin/php artisan db:seed --class=ImportExistingMediaSeeder --force
            /opt/alt/php84/usr/bin/php artisan db:seed --class=PricingSeeder --force
            /opt/alt/php84/usr/bin/php artisan db:seed --class=SocialLinkSeeder --force
            /opt/alt/php84/usr/bin/php artisan content:import
            /opt/alt/php84/usr/bin/php artisan optimize:clear
            /opt/alt/php84/usr/bin/php artisan config:cache
            /opt/alt/php84/usr/bin/php artisan route:cache
            /opt/alt/php84/usr/bin/php artisan view:cache
            /opt/alt/php84/usr/bin/php artisan vendor:publish --tag=filament-assets --force
            cp -r $DOMAIN/laravel/public/. $DOMAIN/public_html/
            cp $DOMAIN/laravel/public_html_index.php $DOMAIN/public_html/index.php
            cp $DOMAIN/laravel/public_html.htaccess $DOMAIN/public_html/.htaccess
          ENDSSH
