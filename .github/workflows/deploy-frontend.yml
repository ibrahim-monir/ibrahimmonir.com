name: Deploy Frontend to Hostinger

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'server.js'
      - 'package.json'
      - '.github/workflows/deploy-frontend.yml'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build Next.js
        working-directory: frontend
        env:
          NEXT_PUBLIC_API_URL: https://api.ibrahimmonir.com/api
        run: |
          npm run build
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Create deployment archive
        run: |
          tar -czf deploy-frontend.tar.gz \
            server.js \
            package.json \
            frontend/.next/standalone

      - name: Upload archive to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "deploy-frontend.tar.gz"
          target: "~/domains/ibrahimmonir.com/"

      - name: Extract and restart app
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd ~/domains/ibrahimmonir.com
            tar -xzf deploy-frontend.tar.gz
            rm deploy-frontend.tar.gz
            mkdir -p tmp
            touch tmp/restart.txt
